<!DOCTYPE html>
<html>
<head>
<title>NEON ROYALE CLUB</title>

<style>

body{
background:#000;
color:#fff;
text-align:center;
font-family:Arial;
}

h1{
color:#ff004c;
}

.slot{
display:flex;
justify-content:center;
margin-top:40px;
}

.reel{
width:110px;
height:110px;
border:3px solid gold;
margin:6px;
font-size:45px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
transition:transform 0.2s;
}

.spin{
transform:rotateX(360deg);
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
background:#ff004c;
color:white;
border:none;
cursor:pointer;
}

.win{
color:gold;
font-size:28px;
}

</style>
</head>

<body>

<h1>🎰 NEON ROYALE CLUB</h1>

<div class="slot">
<div class="reel" id="r1">?</div>
<div class="reel" id="r2">?</div>
<div class="reel" id="r3">?</div>
<div class="reel" id="r4">?</div>
<div class="reel" id="r5">?</div>
</div>

<button onclick="spin()">SPIN</button>

<h2 id="result"></h2>

<audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

<script src="slot.js"></script>

</body>
</html>
